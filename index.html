<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arzé Spa | Price List</title>
  <meta name="description" content="Luxury delivered. Discover Arzé Spa treatments in Jeddah." />
  <link rel="canonical" href="https://wbstudio.xyz/arze-price-list/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wbstudio.xyz/arze-price-list/" />
  <meta property="og:title" content="Arzé Spa | Price List" />
  <meta property="og:description" content="Luxury delivered. Discover Arzé Spa treatments in Jeddah." />
  <meta property="og:image" content="https://wbstudio.xyz/arze-price-list/assets/images/arze-spa-price-list-og.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Arzé Spa Price List" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://wbstudio.xyz/arze-price-list/" />
  <meta name="twitter:title" content="Arzé Spa | Price List" />
  <meta name="twitter:description" content="Luxury delivered. Discover Arzé Spa treatments in Jeddah." />
  <meta name="twitter:image" content="https://wbstudio.xyz/arze-price-list/assets/images/arze-spa-price-list-og.jpg" />
  <meta name="twitter:image:alt" content="Arzé Spa Price List" />
  <link rel="icon" href="./assets/icons/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="./assets/icons/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="app" aria-label="Arzé price list landing">

    <!-- HEADER (shared) -->
    <header class="brand">
      <div class="logoWrap">
        <img class="logo" src="./assets/logo.png" alt="Arzé Logo" />
      </div>

      <h1 class="title">Price List</h1>
    </header>

    <!-- VIEW A: Category Select -->
    <section id="view-categories" class="view view--active" aria-label="Choose category">
      <p class="titleSubline">Tap a category to explore available services.</p>
      <div id="categoryGrid" class="categoryGrid"></div>

      <div class="landingInfo" aria-label="Service and location information">
        <p class="landingInfoLine">Home service delivery available across Jeddah.</p>
        <p class="landingInfoLine">
          Or visit us at
          <a
            class="landingInfoLink"
            href="https://maps.app.goo.gl/7Xvxx6xLCyNSnrvw9"
            target="_blank"
            rel="noopener"
            aria-label="Open Novotel Jeddah Tahlia location in Google Maps"
          >
            <span class="landingInfoPin" aria-hidden="true">📍</span>
            <span class="landingInfoStrong">Novotel Jeddah Tahlia</span>
          </a>
          .
        </p>
      </div>

      <a class="callBtn" href="tel:+966598256743">Call Arzé</a>
    </section>

    <!-- VIEW B: Category Details -->
    <section id="view-category" class="view" aria-label="Category details">
      <div class="backWrap">
        <button id="backBtn" class="backBtn" type="button" aria-label="Back">
          <span class="backIcon" aria-hidden="true">←</span>
          <span class="backText">Back</span>
        </button>
      </div>

      <header class="catHeader">
        <p id="catTagline" class="catTagline"></p>
        <h2 id="catTitle" class="catTitle"></h2>
        <p id="catIntro" class="catIntro"></p>
      </header>

      <div id="serviceList" class="serviceList"></div>

      <div class="ctaBlock">
        <a id="whatsAppBtn" class="ctaBtn" href="#" target="_blank" rel="noopener">
          Contact Arzé
        </a>
        <p class="ctaNote">WhatsApp opens instantly.</p>
      </div>
    </section>

  </main>

  <script src="./js/app.js"></script>
</body>
</html>
